info:
  name: Validate pet updated by tags
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL2}}/pet/findByTags?tags={{petTags}}"
  params:
    - name: tags
      value: "{{petTags}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
