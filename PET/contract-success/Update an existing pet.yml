info:
  name: Update an existing pet
  type: http
  seq: 1

http:
  method: PUT
  url: "{{baseURL2}}/pet"
  body:
    type: json
    data: |-
      {
        "id": "{{petId}}",
        "name": "{{petName}}",
        "category": {
          "id": "{{categoryId}}",
          "name": "{{petBreed}}"
        },
        "photoUrls": [
          "photoUrl"
        ],
        "tags": [
          {
            "id": "{{tagId}}",
            "name": "{{petTags}}"
          }
        ],
        "status": "{{petStatus}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        //Gera um ID de pedido aleatório entre 1 e 900000

        const categoryIdRandom = Math.floor(Math.random() * 900000000) + 1;
        bru.setVar("categoryId", categoryIdRandom);

        const tagIdRandom = Math.floor(Math.random() * 900000000) + 1;
        bru.setVar("tagId", tagIdRandom);

        // Matriz de Pets com Pares Fixos (Nome + Raça atrelados)
        const petListValidate = [
          { name: "Zoe", breed: "Maltes", tags: "maltes" },
          { name: "Pepe", breed: "Dachshund", tags: "dachshund" },
          { name: "Miny", breed: "Dachshund", tags: "dachshund" },
          { name: "Charlie", breed: "Golden Retriever", tags: "golden" },
          { name: "Max", breed: "Bulldog", tags: "bulldog" },
          { name: "Luna", breed: "Persa", tags: "persa" },
          { name: "Bella", breed: "Poodle", tags: "poodle" },
          { name: "Rocky", breed: "Beagle", tags: "beagle" },
          { name: "Molly", breed: "Siames", tags: "siames" },
          { name: "Daisy", breed: "Labrador", tags: "labrador" }
        ];

        // Sorteia um único objeto completo da lista
        const petRandom = petListValidate[Math.floor(Math.random() * petListValidate.length)];
        // Salva as variáveis idênticas ao par sorteado
        bru.setVar("petName", petRandom.name);
        bru.setVar("petBreed", petRandom.breed);
        bru.setVar("petTags", petRandom.tags);

        const statusListValidate = [ "available", "pending", "sold"]
        const statusRandom = statusListValidate[Math.floor(Math.random() * statusListValidate.length)];
        bru.setVar("petStatus", statusRandom);
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato estrito para o retorno do PUT /pet
        const petPutSchema = {
          type: "object",
          properties: {
            id: { type: "integer" },
            category: {
              type: "object",
              properties: {
                id: { type: "integer" },
                name: { type: "string" }
              },
              required: ["id", "name"],
              additionalProperties: false
            },
            name: { type: "string" },
            photoUrls: {
              type: "array",
              items: { type: "string" }
            },
            tags: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  id: { type: "integer" },
                  name: { type: "string" }
                },
                required: ["id", "name"],
                additionalProperties: false
              }
            },
            status: { type: "string" }
          },
          required: ["id", "category", "name", "photoUrls", "tags", "status"],
          additionalProperties: false
        };

        // 2. Captura o corpo da resposta da API após a atualização
        const responseBody = res.getBody();

        // 3. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(petPutSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("O contrato do JSON Schema (PUT Pet) deve ser válido", function() {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do PUT Pet:", validate.errors);
          }
        });
    - type: tests
      code: |-
        const data = res.getBody();

        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(1500);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        test("validate the existence and values of required fields", function() {
          // Garante que o campo existe (não é undefined ou null)
          expect(data).to.have.property('id');
          expect(data).to.have.property('category');
          expect(data.category).to.have.property('id');
          expect(data.category).to.have.property('name');
          expect(data).to.have.property('name');
          expect(data).to.have.property('photoUrls');
          expect(data).to.have.property('tags');  
          expect(data.tags[0]).to.have.property('id');
          expect(data.tags[0]).to.have.property('name');
          expect(data).to.have.property('status');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

