info:
  name: Find pet by ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseURL}}/pet/{{petId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato para um ÚNICO objeto Pet (Retorno por ID)
        const petByIdSchema = {
          type: "object",
          properties: {
            id: { type: "integer" },
            category: {
              type: "object",
              properties: {
                id: { type: "integer" },
                name: { type: "string" }
              },
              required: ["id", "name"],
              additionalProperties: false
            },
            name: { type: "string" },
            photoUrls: {
              type: "array",
              items: { type: "string" }
            },
            tags: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  id: { type: "integer" },
                  name: { type: "string" }
                },
                required: ["id", "name"],
                additionalProperties: false
              }
            },
            status: { type: "string" }
          },
          required: ["id", "category", "name", "photoUrls", "tags", "status"],
          additionalProperties: false
        };

        // 2. Captura o corpo da resposta do servidor
        const responseBody = res.getBody();

        // 3. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(petByIdSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("O contrato do JSON Schema (GET Pet by ID) deve ser válido", function() {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do Pet:", validate.errors);
          }
        });
    - type: tests
      code: |-
        const data = res.getBody();

        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(1500);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        test("validate the existence and values of required fields", function() {
          // Garante que o campo existe (não é undefined ou null)
          expect(data).to.have.property('id');
          expect(data).to.have.property('category');
          expect(data.category).to.have.property('id');
          expect(data.category).to.have.property('name');
          expect(data).to.have.property('name');
          expect(data).to.have.property('photoUrls');
          expect(data).to.have.property('tags');  
          expect(data.tags[0]).to.have.property('id');
          expect(data.tags[0]).to.have.property('name');
          expect(data).to.have.property('status');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
