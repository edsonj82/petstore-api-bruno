info:
  name: Find pet by ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseURL}}/pet/{{petId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato para um ÚNICO objeto Pet (Retorno por ID)
        const petByIdSchema = {
          type: "object",
          properties: {
            id: { type: "integer" },
            category: {
              type: "object",
              properties: {
                id: { type: "integer" },
                name: { type: "string" }
              },
              required: ["id", "name"],
              additionalProperties: false
            },
            name: { type: "string" },
            photoUrls: {
              type: "array",
              items: { type: "string" }
            },
            tags: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  id: { type: "integer" },
                  name: { type: "string" }
                },
                required: ["id", "name"],
                additionalProperties: false
              }
            },
            status: { type: "string" }
          },
          required: ["id", "category", "name", "photoUrls", "tags", "status"],
          additionalProperties: false
        };

        // 2. Captura o corpo da resposta do servidor
        const responseBody = res.getBody();

        // 3. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(petByIdSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("O contrato do JSON Schema (GET Pet by ID) deve ser válido", function() {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do Pet:", validate.errors);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
