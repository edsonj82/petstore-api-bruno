info:
  name: Finds Pets by status
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseURL2}}/pet/findByStatus?status={{petStatus}}"
  params:
    - name: status
      value: "{{petStatus}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato para uma LISTA (Array) de Pets por Status
        const petFindByStatusSchema = {
          type: "array",
          items: {
            type: "object",
            properties: {
              id: { type: "integer" },
              category: {
                type: "object",
                properties: {
                  id: { type: "integer" },
                  name: { type: "string" }
                },
                required: ["id", "name"],
                additionalProperties: false
              },
              name: { type: "string" },
              photoUrls: {
                type: "array",
                items: { type: "string" }
              },
              tags: {
                type: "array",
                items: {
                  type: "object",
                  properties: {
                    id: { type: "integer" },
                    name: { type: "string" }
                  },
                  required: ["id", "name"],
                  additionalProperties: false
                }
              },
              status: { type: "string" }
            },
            required: ["id", "category", "name", "photoUrls", "tags", "status"],
            additionalProperties: false
          }
        };

        // 2. Captura o corpo da resposta do servidor (Array de objetos)
        const responseBody = res.getBody();

        // 3. Compila e executa a validação do contrato JSON Schema
        const validate = schemaValidator.compile(petFindByStatusSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("O contrato do JSON Schema (Find by Status) deve ser válido", function() {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato da lista:", JSON.stringify(validate.errors, null, 2));
            //console.error("Erros encontrados no contrato da lista por status:", validate.errors);
          }
        });

        // 5. Teste funcional de QA: Garante que a resposta é um array e não veio vazia
        test("A resposta deve retornar uma lista populada de Pets", function() {
          expect(responseBody).to.be.an('array');
          expect(responseBody.length).to.be.above(0);
        });
    - type: tests
      code: |-
        const data = res.getBody();

        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(2000);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        // Validação de Existência e Estrutura de Campos Obrigatórios na Lista
        test("validate the existence and values of required fields for each pet", function() {
          // Garante primeiro que a resposta recebida é de fato uma lista populada
          expect(data).to.be.an('array');
          
          // Se a lista tiver itens, valida a estrutura interna do primeiro pet (ou de todos)
          if (data.length > 0) {
            const firstPet = data[0]; // Foca a validação no primeiro objeto do array para amostragem

            // Garante que o objeto do Pet possui as propriedades raiz
            expect(firstPet).to.have.property('id');
            expect(firstPet).to.have.property('name');
            expect(firstPet).to.have.property('status');
            expect(firstPet).to.have.property('photoUrls');
            expect(firstPet).to.have.property('tags');  
            
            // Valida a subestrutura de 'category' apenas se ela existir no pet
            if (firstPet.category) {
              expect(firstPet.category).to.have.property('id');
              expect(firstPet.category).to.have.property('name');
            }

            // Valida os itens de 'tags' apenas se a lista de tags não estiver vazia
            if (firstPet.tags && firstPet.tags.length > 0) {
              expect(firstPet.tags[0]).to.have.property('id');
              expect(firstPet.tags[0]).to.have.property('name');
            }
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
