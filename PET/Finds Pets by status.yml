info:
  name: Finds Pets by status
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseURL}}/pet/findByStatus?status={{petStatus}}"
  params:
    - name: status
      value: "{{petStatus}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
