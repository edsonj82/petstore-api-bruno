info:
  name: Finds Pets by status
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/pet/findByStatus?status=available"
  params:
    - name: status
      value: available
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
