info:
  name: Find pets by tags
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseURL}}/pet/findByTags?tags=tags"
  params:
    - name: tags
      value: tags
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
