info:
  name: Delete a pet
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{baseURL}}/pet/{{petId}}"
  body:
    type: json
    data: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Remove os valores das variáveis do ambiente ativo do Bruno
        bru.setEnvVar("petId", null);
        bru.setEnvVar("status", null);
        bru.setEnvVar("category", null);
        bru.setEnvVar("tag", null);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new pet in the store
