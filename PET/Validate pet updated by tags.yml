info:
  name: Validate pet updated by tags
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseURL}}/pet/findByTags?tags={{tag}}"
  params:
    - name: tags
      value: "{{tag}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
