info:
  name: Update an existing pet
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseURL}}/pet"
  body:
    type: json
    data: |-
      {
        "id": {{petId}},
        "name": "Pepê",
        "category": {
          "id": 987654321,
          "name": "Dachshund"
        },
        "photoUrls": [
          "string"
        ],
        "tags": [
          {
            "id": 987654321,
            "name": "tags"
          }
        ],
        "status": "available"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const responseData  = res.getBody();

        if(responseData && responseData.id){
          bru.setVar("category", responseData.category.name)
          bru.setVar("tag", responseData.tags[0].name)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

