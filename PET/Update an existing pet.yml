info:
  name: Update an existing pet
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseURL}}/pet"
  body:
    type: json
    data: |-
      {
        "id": "{{petId}}",
        "name": "{{petName}}",
        "category": {
          "id": "{{categoryId}}",
          "name": "{{petBreed}}"
        },
        "photoUrls": [
          "photoUrl"
        ],
        "tags": [
          {
            "id": "{{tagId}}",
            "name": "{{petTags}}"
          }
        ],
        "status": "{{petStatus}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        //Gera um ID de pedido aleatório entre 1 e 900000

        const categoryIdRandom = Math.floor(Math.random() * 900000000) + 1;
        bru.setVar("categoryId", categoryIdRandom);

        const tagIdRandom = Math.floor(Math.random() * 900000000) + 1;
        bru.setVar("tagId", tagIdRandom);

        // Matriz de Pets com Pares Fixos (Nome + Raça atrelados)
        const petListValidate = [
          { name: "Zoe", breed: "Maltes", tags: "maltes" },
          { name: "Pepe", breed: "Dachshund", tags: "dachshund" },
          { name: "Miny", breed: "Dachshund", tags: "dachshund" },
          { name: "Charlie", breed: "Golden Retriever", tags: "golden" },
          { name: "Max", breed: "Bulldog", tags: "bulldog" },
          { name: "Luna", breed: "Persa", tags: "persa" },
          { name: "Bella", breed: "Poodle", tags: "poodle" },
          { name: "Rocky", breed: "Beagle", tags: "beagle" },
          { name: "Molly", breed: "Siames", tags: "siames" },
          { name: "Daisy", breed: "Labrador", tags: "labrador" }
        ];

        // Sorteia um único objeto completo da lista
        const petRandom = petListValidate[Math.floor(Math.random() * petListValidate.length)];
        // Salva as variáveis idênticas ao par sorteado
        bru.setVar("petName", petRandom.name);
        bru.setVar("petBreed", petRandom.breed);
        bru.setVar("petTags", petRandom.tags);

        const statusListValidate = [ "available", "pending", "sold"]
        const statusRandom = statusListValidate[Math.floor(Math.random() * statusListValidate.length)];
        bru.setVar("petStatus", statusRandom);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new pet in the store
