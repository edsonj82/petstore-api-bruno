info:
  name: Update an existing pet
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseURL}}/pet"
  body:
    type: json
    data: |-
      {
        "id": 123456789,
        "name": "Zoe",
        "category": {
          "id": 987654321,
          "name": "Salsicha"
        },
        "photoUrls": [
          "string"
        ],
        "tags": [
          {
            "id": 987654321,
            "name": "tags"
          }
        ],
        "status": "available"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new pet in the store
