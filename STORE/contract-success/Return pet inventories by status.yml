info:
  name: Return pet inventories by status
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL2}}/store/inventory"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato dinâmico para o Inventário
        const storeInventorySchema = {
          type: "object",
          // O pattern abaixo mapeia qualquer chave de texto (^[.*]$) e valida se o valor associado é inteiro
          patternProperties: {
            "^.*$": { type: "integer" }
          },
          additionalProperties: false
        };

        // 2. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(storeInventorySchema);
        const responseBody = res.getBody();
        const isSchemaValid = validate(responseBody);

        // ==========================================
        // VALIDAÇÃO DO CONTRATO (JSON SCHEMA)
        // ==========================================

        test("O contrato do JSON Schema (GET Store Inventory) deve ser válido e dinâmico", function () {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do Inventory:", JSON.stringify(validate.errors, null, 2));
          }
        });
    - type: tests
      code: |-
        // ==========================================
        // VALIDAÇÕES DE INFRAESTRUTURA & METADADOS
        // ==========================================

        const data = res.getBody();

        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(2500);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        test("validate the existence and values of required fields", function() {
          // Garante que o campo existe (não é undefined ou null)
          expect(data).to.have.property('totvs');
          expect(data).to.have.property('IFoseRcxrr');
          expect(data).to.have.property('string');
          expect(data).to.have.property('sold');
          expect(data).to.have.property('pending');
          expect(data).to.have.property('available');
          expect(data).to.have.property('weisskeiner1');
          expect(data).to.have.property('soldout');
          expect(data).to.have.property('unknown_status');
          expect(data).to.have.property('available, sold');
          expect(data).to.have.property('Available');
          expect(data).to.have.property('sold');
          expect(data).to.have.property('NOT available');
          expect(data).to.have.property('d');
          expect(data).to.have.property('Goobie woobie');
          expect(data).to.have.property('available');
          //expect(data).to.have.property('discontinued');
          expect(data).to.have.property('availabl');
          //expect(data).to.have.property('peric');
          expect(data).to.have.property('ожидается');
          expect(data).to.have.property('pending sale');
          expect(data).to.have.property('Active');
          expect(data).to.have.property('SOLD');
          expect(data).to.have.property('null');
          expect(data).to.have.property('invalid_status');
          //expect(data).to.have.property('8');
          expect(data).to.have.property('12345');
          expect(data).to.have.property('adopted');
          expect(data).to.have.property('Contento');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new pet in the store
