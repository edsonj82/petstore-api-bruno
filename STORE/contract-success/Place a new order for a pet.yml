info:
  name: Place a new order for a pet
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseURL2}}/store/order"
  body:
    type: json
    data: |-
      {
        "id": "{{orderId}}",
        "petId": "{{petId}}",
        "quantity": 7,
        "shipDate": "{{storeShipDate}}",
        "status": "{{storeStatus}}",
        "complete": true
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const orderIdRandom = Math.floor(Math.random() * 900000) + 1;
        bru.setVar("orderId", orderIdRandom);

        const statusStoreListValidate = [ "placed", "approved", "delivered"]
        const statusStoreRandom = statusStoreListValidate[Math.floor(Math.random() * statusStoreListValidate.length)];
        bru.setVar("storeStatus", statusStoreRandom);


        // 1. Obtém a data e hora atual do sistema (Local da execução)
        const now = new Date();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');

        // 2. Extrai o horário atual em tempo real (Horário Local do Brasil)
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const milliseconds = String(now.getMilliseconds()).padStart(3, '0');

        // 3. Monta a string com o horário do Brasil e o indicador de fuso -0300
        const formattedTimestampBr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${milliseconds}+0000`;

        // 4. Salva a variável dinâmica para o Bruno API
        bru.setVar("storeShipDate", formattedTimestampBr);
    - type: after-response
      code: |-
        const responseData  = res.getBody();

        if(responseData && responseData.id && responseData.status){
          bru.setVar("quantity", responseData.quantity)
          bru.setVar("complete", responseData.complete)
        }

        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato estrito para o recurso Store Order
        const storeOrderPostSchema = {
          type: "object",
          properties: {
            id: { type: "integer" },
            petId: { type: "integer" },
            quantity: { type: "integer" },
            shipDate: { type: "string" },
            status: { type: "string" },
            complete: { type: "boolean" }
          },
          required: ["id", "petId", "quantity", "shipDate", "status", "complete"],
          additionalProperties: false
        };

        // 2. Captura o corpo da resposta do servidor
        const responseBody = res.getBody();

        // 3. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(storeOrderPostSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("O contrato do JSON Schema (POST Store Order) deve ser válido", function () {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do Order:", JSON.stringify(validate.errors, null, 2));
          }
        });
    - type: tests
      code: |-
        const data = res.getBody();

        test("Status code deve ser 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(1500);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        test("validate the existence and values of required fields", function() {
          // Garante que o campo existe (não é undefined ou null)
          expect(data).to.have.property('id');
          expect(data).to.have.property('petId');
          expect(data).to.have.property('quantity');
          expect(data).to.have.property('shipDate');
          expect(data).to.have.property('status');
          expect(data).to.have.property('complete');  
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

