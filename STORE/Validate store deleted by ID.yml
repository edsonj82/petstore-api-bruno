info:
  name: Validate store deleted by ID
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseURL2}}/store/order/{{orderId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Remove os valores das variáveis do ambiente ativo do Bruno
        bru.deleteVar("orderId");
        bru.deleteVar("storeStatus");


        bru.deleteVar("quantity");
        bru.deleteVar("shipDate");
        //bru.deleteVar("status");
        bru.deleteVar("complete");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
