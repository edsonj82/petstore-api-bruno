info:
  name: Validate store deleted by ID
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseURL2}}/store/order/{{orderId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const ajv = require('ajv');
        const schemaValidator = new ajv({ allErrors: true });

        // 1. Definição do contrato estrito para a consulta do pedido (Store Order)
        const storeOrderGetSchema = {
          type: "object",
          properties: {
            code: { type: "integer" },
            type: { type: "string" },
            message: { type: "string" },    
          },
          required: ["code", "type", "message"]
        };

        // 2. Captura o corpo da resposta e o status code do servidor
        const responseBody = res.getBody();
        const statusCode = res.getStatus();

        // 3. Compila e executa a validação do contrato
        const validate = schemaValidator.compile(storeOrderGetSchema);
        const isSchemaValid = validate(responseBody);

        // 4. Asserts para o relatório de automação do Bruno
        test("O contrato do JSON Schema (GET Store Order por ID) deve ser válido", function () {
          expect(isSchemaValid).to.be.true;
          
          if (!isSchemaValid) {
            console.error("Erros encontrados no contrato do GET Order:", JSON.stringify(validate.errors, null, 2));
          }
        });

        // Remove os valores das variáveis do ambiente ativo do Bruno
        bru.deleteVar("orderId");
        bru.deleteVar("storeStatus");
        bru.deleteVar("quantity");
        bru.deleteVar("shipDate");
        //bru.deleteVar("status");
        bru.deleteVar("complete");
    - type: tests
      code: |-
        // 1. Captura o corpo da resposta e o status HTTP
        const responseBody = res.getBody();
        const statusCode = res.getStatus();

        // ==========================================
        // VALIDAÇÃO DO CENÁRIO: ORDER NOT FOUND
        // ==========================================

        if (statusCode === 404) {

          test("Status code deve ser 404 Not Found", function() {
            expect(statusCode).to.equal(404);
          });
          
          // Validação funcional: Garante que o ID retornado é o mesmo que foi requisitado na URL
          test("O ID do pedido retornado deve coincidir com o ID consultado", function () {
           const expectedOrderId = bru.getVar("orderId");
           if (expectedOrderId) {
            expect(responseBody.id).to.equal(Number(expectedOrderId));
          }
        });

          test("O conteúdo do texto deve confirmar a exclusão do pet", function() {
          // Valida o contrato textual exato retornado pelo seu serviço
          //expect(responseBody).to.equal("Pet deleted");
          expect(responseBody).to.have.property('code');
          expect(responseBody).to.have.property('type');
          expect(responseBody).to.have.property('message');  
        });
          
          test("A resposta de erro deve ser do tipo string (Plain Text)", function() {
            expect(responseBody.message).to.be.a('string');
          });

          test("A mensagem de retorno deve ser 'Order not found'", function() {
            // O .trim() garante a remoção de quebras de linha ou espaços fantasmas do servidor
            expect(responseBody.trim()).to.equal("Order not found");
          });

        } else {
          // Mantém um alerta caso o teste rode esperando o erro mas a API traga um sucesso (200)
          test("Validar se o comportamento esperado era realmente o erro 404", function() {
            console.warn("Atenção: A API respondeu com status " + statusCode + " em vez de 404.");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
