info:
  name: Add a new pet to the store
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseURL2}}/pet"
  body:
    type: json
    data: |-
      {
        "id": {{petId}},
        "name": "Zoe",
        "category": {
          "id": {{categoryId}},
          "name": "Maltes"
        },
        "photoUrls": [
          "photoUrl"
        ],
        "tags": [
          {
            "id": {{tagId}},
            "name": "tags"
          }
        ],
        "status": "available"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // Gera um ID de pedido aleatório entre 1 e 900000
        const petIdRandom = Math.floor(Math.random() * 900000) + 1;
        bru.setVar("petId", petIdRandom);

        const categoryIdRandom = Math.floor(Math.random() * 900000) + 1;
        bru.setVar("categoryId", categoryIdRandom);

        const tagIdRandom = Math.floor(Math.random() * 900000) + 1;
        bru.setVar("tagId", tagIdRandom);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new pet in the store
