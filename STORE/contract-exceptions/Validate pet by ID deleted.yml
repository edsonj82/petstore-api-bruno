info:
  name: Validate pet by ID deleted
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseURL2}}/pet/{{petId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Remove os valores das variáveis do ambiente ativo do Bruno
        bru.deleteVar("petId");
        //bru.deleteVar("petName");
        bru.deleteVar("categoryId");
        //bru.deleteVar("petBreed");
        bru.deleteVar("tagId");
        bru.deleteVar("petTags");
        bru.deleteVar("petStatus");
    - type: tests
      code: |-
        const data = res.getBody();

        test("Status code deve ser 404 OK", function() {
          expect(res.getStatus()).to.equal(404);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(2000);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })

        // 1. Converte o corpo da resposta em um objeto JSON manipulável
        const responseBody = res.getBody();
        const statusCode = res.getStatus();

        // ==========================================
        // VALIDAÇÕES DE INFRAESTRUTURA & METADADOS
        // ==========================================

        test("Deve conter a estrutura e a mensagem de erro esperada", function() {
          // Garante que o corpo possui as propriedades raiz de erro da Petstore
          expect(responseBody).to.have.property('code');
          expect(responseBody).to.have.property('type');
          expect(responseBody).to.have.property('message');

          // Valida os valores exatos retornados pelo backend para este cenário
          expect(responseBody.code).to.equal(1);
          expect(responseBody.type).to.equal("unknown");
          expect(responseBody.message).to.equal("Pet not found");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Multiple status values can be provided with comma separated strings.
