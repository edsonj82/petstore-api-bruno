info:
  name: Place a new order for a pet
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseURL2}}/store/order"
  body:
    type: json
    data: |-
      {
        "id": "{{orderId}}",
        "petId": "{{petId}}",
        "quantity": 7,
        "shipDate": "{{storeShipDate}}",//bug
        "status": "{{storeStatus}}",
        "complete": true
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const orderIdRandom = Math.floor(Math.random() * 900000) + 1;
        bru.setVar("orderId", orderIdRandom);

        const statusStoreListValidate = [ "placed", "approved", "delivered"]
        const statusStoreRandom = statusStoreListValidate[Math.floor(Math.random() * statusStoreListValidate.length)];
        bru.setVar("storeStatus", statusStoreRandom);


        // 1. Obtém a data e hora atual do sistema (Local da execução)
        const now = new Date();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');

        // 2. Extrai o horário atual em tempo real (Horário Local do Brasil)
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const milliseconds = String(now.getMilliseconds()).padStart(3, '0');

        // 3. Monta a string com o horário do Brasil e o indicador de fuso -0300
        const formattedTimestampBr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${milliseconds}+0000`;

        // 4. Salva a variável dinâmica para o Bruno API
        bru.setVar("storeShipDate", formattedTimestampBr);
    - type: after-response
      code: |-
        const responseData  = res.getBody();

        if(responseData && responseData.id && responseData.status){
          //bru.setVar("orderId", responseData.id)
          //bru.setVar("status", responseData.status)
          bru.setVar("quantity", responseData.quantity)
          //bru.setVar("shipDate", responseData.shipDate)
          bru.setVar("complete", responseData.complete)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

